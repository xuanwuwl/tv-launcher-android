name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle Wrapper
        run: |
          # setup-android provides sdkmanager; use it to install build tools
          # then generate wrapper via Gradle distribution
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
              /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd ${{ github.workspace }}
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tv-launcher-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: |
          cd ${{ github.workspace }}
          ./gradlew assembleRelease --no-daemon --stacktrace || true

      - name: Upload Release APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tv-launcher-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
